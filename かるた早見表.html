let index = 0;
let shimoVisible = false;

function render() {
  const poem = poems[index];
  const poemDiv = document.getElementById("poem");

  poemDiv.textContent =

  document.getElementById("index").textContent =
    `${index + 1} / ${poems.length}`;
}

function showShimo() {
  shimoVisible = !shimoVisible;
  render();
}

function nextCard() {
  index = (index + 1) % poems.length;
  shimoVisible = false;
  render();
}

function prevCard() {
  index = (index - 1 + poems.length) % poems.length;
  shimoVisible = false;
  render();
}
